<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verano 2026 Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Georgia',serif;
  background:#14001f;
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:2rem 1rem;
}
.title-wrap{text-align:center;margin-bottom:1.5rem;}
h1{
  font-size:clamp(1.8rem,5vw,3rem);
  color:#ffd700;
  letter-spacing:4px;
  text-transform:uppercase;
}
.subtitle{
  color:#a07820;
  font-size:0.75rem;
  letter-spacing:6px;
  text-transform:uppercase;
  margin-top:4px;
}
.machine{
  background:linear-gradient(160deg,#200840,#130228);
  border:2px solid #ffd700;
  border-radius:18px;
  padding:1.75rem 1.5rem 1.5rem;
  width:100%;
  max-width:860px;
  box-shadow:0 0 40px rgba(255,215,0,0.12),inset 0 0 60px rgba(0,0,0,0.4);
}
.machine-header{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:1.25rem;
}
.bulb{
  width:12px;height:12px;
  border-radius:50%;
  background:#ffd700;
  opacity:0.25;
  transition:opacity 0.15s, box-shadow 0.15s;
}
.bulb.on{opacity:1;box-shadow:0 0 8px #ffd700;}
.reels{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:1.25rem;
}
.reel-col{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}
.reel-label{
  font-size:0.6rem;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#a07820;
  height:14px;
}
.reel{
  width:100%;
  height:110px;
  background:#08000f;
  border:2px solid #3d2060;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
  transition:border-color 0.3s;
}
.reel::before,.reel::after{
  content:'';
  position:absolute;
  left:0;right:0;
  height:28px;
  pointer-events:none;
  z-index:2;
}
.reel::before{top:0;background:linear-gradient(to bottom,#08000f,transparent);}
.reel::after{bottom:0;background:linear-gradient(to top,#08000f,transparent);}
.reel-slot{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  width:100%;
  padding:0 8px;
}
.reel-item{
  font-size:clamp(0.7rem,1.2vw,0.95rem);
  font-weight:bold;
  text-align:center;
  color:#ddd;
  line-height:1.3;
  padding:2px 0;
  transition:color 0.2s;
}
.reel-item.active{color:#fff;font-size:clamp(0.8rem,1.4vw,1.05rem);}
.reel.spinning{border-color:#6030a0;}
.reel.spinning .reel-item.active{
  animation:flicker 0.08s steps(1,end) infinite;
}
.reel.stopped{border-color:#00e676;}
.reel.stopped .reel-item.active{color:#00e676;}
@keyframes flicker{
  0%{opacity:1;}
  49%{opacity:0.5;}
  50%{opacity:1;}
}
.reel-dots{
  display:flex;gap:4px;
}
.dot{
  width:7px;height:7px;
  border-radius:50%;
  background:#ffd700;
  opacity:0.2;
  transition:opacity 0.1s,box-shadow 0.1s;
}
.dot.on{opacity:1;box-shadow:0 0 5px #ffd700;}
.result-area{
  background:#05000d;
  border:2px solid #2a1050;
  border-radius:10px;
  padding:1.1rem 1.25rem;
  text-align:center;
  min-height:68px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:1.25rem;
  transition:border-color 0.4s;
}
.result-text{
  font-size:clamp(0.9rem,2vw,1.2rem);
  color:#ffd700;
  font-weight:bold;
  line-height:1.6;
  transition:opacity 0.3s;
}
.result-text.idle{
  color:#3d2a5a;
  font-style:italic;
  font-weight:normal;
  font-size:0.9rem;
}
.btn-wrap{text-align:center;}
button{
  background:#ffd700;
  color:#14001f;
  border:none;
  border-radius:10px;
  padding:0.85rem 3rem;
  font-size:1.1rem;
  font-weight:bold;
  letter-spacing:3px;
  text-transform:uppercase;
  cursor:pointer;
  width:100%;
  transition:background 0.15s,transform 0.1s;
  font-family:'Georgia',serif;
}
button:hover{background:#ffe84d;}
button:active{transform:scale(0.98);}
button:disabled{background:#3d3010;color:#7a6010;cursor:not-allowed;}
.footer{
  margin-top:1.25rem;
  color:#3d2a5a;
  font-size:0.7rem;
  letter-spacing:3px;
  text-transform:uppercase;
  text-align:center;
}
</style>
</head>
<body>

<div class="title-wrap">
  <h1>&#127922; Verano 2026</h1>
  <p class="subtitle">Generator &mdash; El destino ya está escrito</p>
</div>

<div class="machine">
  <div class="machine-header" id="top-bulbs"></div>

  <div class="reels">
    <div class="reel-col">
      <div class="reel-label">Protagonista</div>
      <div class="reel" id="reel-0"><div class="reel-slot" id="slot-0"></div></div>
      <div class="reel-dots" id="dots-0"></div>
    </div>
    <div class="reel-col">
      <div class="reel-label">Situación</div>
      <div class="reel" id="reel-1"><div class="reel-slot" id="slot-1"></div></div>
      <div class="reel-dots" id="dots-1"></div>
    </div>
    <div class="reel-col">
      <div class="reel-label">Con / A</div>
      <div class="reel" id="reel-2"><div class="reel-slot" id="slot-2"></div></div>
      <div class="reel-dots" id="dots-2"></div>
    </div>
    <div class="reel-col">
      <div class="reel-label">Lugar</div>
      <div class="reel" id="reel-3"><div class="reel-slot" id="slot-3"></div></div>
      <div class="reel-dots" id="dots-3"></div>
    </div>
  </div>

  <div class="result-area" id="result-area">
    <div class="result-text idle" id="result-text">Pulsa Comenzar para descubrir qué pasará este verano...</div>
  </div>

  <div class="btn-wrap">
    <button id="btn" onclick="comenzar()">&#127922;&nbsp; Comenzar</button>
  </div>
</div>

<p class="footer">Verano 2026 &mdash; Llamas &amp; Cimanes &amp; alrededores</p>

<script>
const P1 = ['Valentín','César','Sergio','Iván','Dani','Jon','Fozeras','Hugo','Jaime','Nico','Marcos','Aitor','Ivan Madrid'];
const SIT = ['atropellará a','matará a','se peleará con','atacara a','se liará con','secuestrará a','comprara droga a','fumara porros con','metera en el maletero a','avisará de un control a','tendra una discusión con','sera matado por','sera atropellado por','sera secuestrado por','rompera un hueso a','entrara a robar en casa de','destrozara la bicicleta de','robara el alcohol a','empezara una amistad con','empezara una enemistad con','timbrará a casa de','recibirá un escopetazo de','pegará un escopetazo a','su bici sera destrozada por','sus ruedas seran pinchadas por','pinchara las ruedas a','se irá detras de un seto con'];
const P2 = ['Diplo','Lolo Llamas','Javier Marques','Xisco','Majo','Marcos Cimanes','Pablo Franco','Claudia Arias','Fozeras','Manel','Eder','Johanna','Caracubo','Tato','Pablo Tato','Samuel Cimanes','Jarero','Juan Lorena','Valentin Padre','Sara Alcaldesa','Nito','Gabriel el carnicero','Un borracho','Lapa','Un gitano','Milagritos','El hijo de Milagritos','Beatriz','Un pakistani de Carrizo','El moro de Llamas','Felipe el pancho','Campelo','Angeloso','La churrera','Urbano','Don Angel','Deiene','Ixai','Ekaitz','Miguel Villaviciosa','Antonio Villaviciosa','✨ANTONIO✨','Antonio desaparecido','Eider','Natividad','Dudi'];
const LUG = ['en Llamas','en Cimanes','en San Roman','en Quintanilla','en Carrizo','en Azadon','en Villaviciosa','en Secarejo','en Las Omañas','en San Martin de la Falamosa','en la Omañuela','en Villarroquel','en el Camping','en la plaza','en paradanas','detras de la iglesia','en el ayuntamiento','en la presa','en el Camino Rural','en la Fuente Mora','en la Lagunona','en Santa Catalina','en el calvario','en Villanueva','en Montejos','en Leon','en Trobajo'];
const DATASETS = [P1, SIT, P2, LUG];

const NUM_BULBS = 12;
const chosen = [null,null,null,null];
const spinIntervals = [null,null,null,null];
const dotIntervals = [null,null,null,null];
let bulbInterval = null;
let bulbStep = 0;

// Build top bulbs
const topBulbs = document.getElementById('top-bulbs');
for(let i=0;i<NUM_BULBS;i++){
  const b=document.createElement('div');
  b.className='bulb';
  b.id='tb'+i;
  topBulbs.appendChild(b);
}

// Build dot rows (3 dots each reel)
for(let r=0;r<4;r++){
  const wrap=document.getElementById('dots-'+r);
  for(let d=0;d<3;d++){
    const dot=document.createElement('div');
    dot.className='dot';
    dot.id=`d${r}-${d}`;
    wrap.appendChild(dot);
  }
}

function rand(n){return Math.floor(Math.random()*n);}
function pick(arr){return arr[rand(arr.length)];}

function buildSlot(reelIdx, items){
  const slot = document.getElementById('slot-'+reelIdx);
  slot.innerHTML='';
  items.forEach((txt,i)=>{
    const div=document.createElement('div');
    div.className='reel-item'+(i===1?' active':'');
    div.textContent=txt;
    slot.appendChild(div);
  });
}

function initReels(){
  for(let r=0;r<4;r++){
    const data=DATASETS[r];
    const a=rand(data.length), b=(a+1)%data.length, c=(a+2)%data.length;
    buildSlot(r,[data[a],data[b],data[c]]);
    document.getElementById('reel-'+r).className='reel';
    setDots(r,false);
  }
}

function setDots(reelIdx,spinning){
  if(dotIntervals[reelIdx]) clearInterval(dotIntervals[reelIdx]);
  if(!spinning){
    for(let d=0;d<3;d++) document.getElementById(`d${reelIdx}-${d}`).classList.remove('on');
    return;
  }
  let s=0;
  dotIntervals[reelIdx]=setInterval(()=>{
    for(let d=0;d<3;d++) document.getElementById(`d${reelIdx}-${d}`).classList.toggle('on',d===s%3);
    s++;
  },160);
}

function startTopBulbs(){
  if(bulbInterval) clearInterval(bulbInterval);
  bulbStep=0;
  bulbInterval=setInterval(()=>{
    for(let i=0;i<NUM_BULBS;i++) document.getElementById('tb'+i).classList.toggle('on',i%2===(bulbStep%2));
    bulbStep++;
  },200);
}
function stopTopBulbs(){
  if(bulbInterval) clearInterval(bulbInterval);
  for(let i=0;i<NUM_BULBS;i++) document.getElementById('tb'+i).classList.add('on');
}
function resetTopBulbs(){
  if(bulbInterval) clearInterval(bulbInterval);
  for(let i=0;i<NUM_BULBS;i++) document.getElementById('tb'+i).classList.remove('on');
}

function spinReel(r){
  const data=DATASETS[r];
  const reel=document.getElementById('reel-'+r);
  reel.className='reel spinning';
  setDots(r,true);
  spinIntervals[r]=setInterval(()=>{
    const a=rand(data.length),b=(a+1)%data.length,c=(a+2)%data.length;
    buildSlot(r,[data[a],data[b],data[c]]);
  },60);
}

function stopReel(r, callback){
  clearInterval(spinIntervals[r]);
  const data=DATASETS[r];
  const idx=rand(data.length);
  chosen[r]=data[idx];
  const prev=data[(idx+data.length-1)%data.length];
  const next=data[(idx+1)%data.length];
  buildSlot(r,[prev,chosen[r],next]);
  const reel=document.getElementById('reel-'+r);
  reel.className='reel stopped';
  setDots(r,false);
  for(let d=0;d<3;d++) document.getElementById(`d${r}-${d}`).classList.add('on');
  if(callback) callback();
}

function showResult(){
  const [p,s,p2,l]=chosen;
  const rt=document.getElementById('result-text');
  const ra=document.getElementById('result-area');
  rt.className='result-text';
  rt.textContent=`${p} ${s} ${p2} ${l}`;
  ra.style.borderColor='#00e676';
  stopTopBulbs();
  const btn=document.getElementById('btn');
  btn.disabled=false;
  btn.textContent='🎲  Volver a jugar';
}

function comenzar(){
  const btn=document.getElementById('btn');
  btn.disabled=true;
  btn.textContent='⏳  Girando...';
  chosen.fill(null);
  document.getElementById('result-text').className='result-text idle';
  document.getElementById('result-text').textContent='Girando...';
  document.getElementById('result-area').style.borderColor='#2a1050';
  resetTopBulbs();
  startTopBulbs();
  for(let r=0;r<4;r++) spinReel(r);
  const stops=[1500,2500,3500,4500];
  for(let r=0;r<4;r++){
    const rr=r;
    setTimeout(()=>{
      stopReel(rr, rr===3 ? showResult : null);
    }, stops[r]);
  }
}

initReels();
</script>
</body>
</html>
